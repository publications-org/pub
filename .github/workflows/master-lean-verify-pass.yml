name: Ne.app Lean CI (Develop)

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4
    - name: Build CI Pub - Install LaTeX (TexLive)
      run: sudo apt install texlive texlive-latex-extra texlive-science texlive-latex-recommended
    - name: Build CI Pub - Test Lean Install (Test)
      run: sudo curl https://elan.lean-lang.org/elan-init.sh -sSf | sh -y && lean
